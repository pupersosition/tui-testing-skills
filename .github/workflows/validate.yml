name: Validate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  go-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Go test
        run: go test ./...
      - name: Go build
        run: go build ./cmd/agent-tui ./cmd/install-skill

  python-migration-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Run Python script tests
        run: python -m pytest skills/bubbletea-tui-visual-test/scripts/tests
      - name: Verify installer dry-run compatibility
        run: |
          python tools/install_skill.py --agent claude --dry-run
          python tools/install_skill.py --agent copilot --dry-run
          python tools/install_skill.py --agent codex --dry-run
          python tools/install_skill.py --agent opencode --dry-run
